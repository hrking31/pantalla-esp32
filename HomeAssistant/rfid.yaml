esphome:
  name: rfid

esp8266:
 # board: esp01_1m
  board: nodemcuv2
spi:
  clk_pin: 14
  miso_pin: 12
  mosi_pin: 13

rc522_spi:
  cs_pin: 15
  update_interval: 1s

  on_tag:
    then:
      - homeassistant.tag_scanned: !lambda 'return x;'

logger:

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: !secret ip_rfid
    gateway: !secret gateway
    subnet: !secret subnet

  ap:
    ssid: "rfid"
    password: !secret ap_password

captive_portal:

web_server:
  port: 80

#/////////////////////////////////////////////////////////////////////////////////////////

binary_sensor:
  - platform: rc522
    uid: BA-83-8A-80
    name: "LLavero"
    
    on_state:
      then:
        - light.toggle: light_1

  - platform: rc522
    uid: 7A-9D-61-1A
    name: "CaRey"
    
    on_state:
      then:
        - light.toggle: light_1        

output:
  - platform: gpio
    pin: GPIO 5
    id: relay_1

light:
  - platform: binary
    name: "RFID TAG"
    id: light_1
    output: relay_1
